<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#faf9fe"><title>Brainy</title><style>
*{box-sizing:border-box}body{margin:0;background:#fbfaf8;color:#29253c;font:14px system-ui,-apple-system,sans-serif}.app{height:100dvh;display:grid;grid-template-rows:68px minmax(0,1fr) auto auto auto;background:radial-gradient(circle at 50% 0,#f2efff,transparent 32%),#fbfaf8}.top{display:flex;align-items:center;gap:11px;padding:calc(10px + env(safe-area-inset-top)) 15px 10px;border-bottom:1px solid #e8e5ed;background:#fffc;backdrop-filter:blur(14px)}.avatar{width:40px;height:40px;display:grid;place-items:center;border-radius:14px;color:#fff;background:linear-gradient(145deg,#9385ee,#6254d1);box-shadow:0 7px 17px #d4cef4;font-size:19px}.top h1{margin:0;font-size:16px}.top p{margin:3px 0 0;color:#888293;font-size:10px}.online{display:inline-block;width:6px;height:6px;margin-right:5px;border-radius:50%;background:#64b989}.top>button{width:39px;height:39px;margin-left:auto;border:1px solid #e4e0e9;border-radius:12px;background:#fff;font-size:17px}.feed{overflow:auto;padding:20px 12px 12px}.day{width:max-content;margin:0 auto 22px;padding:5px 11px;border-radius:8px;color:#8c8795;background:#efedf2;font-size:9px;font-weight:700}.msg{display:flex;align-items:flex-end;gap:7px;margin-bottom:16px}.msg.me{justify-content:flex-end}.mini{width:26px;height:26px;flex:none;display:grid;place-items:center;border-radius:9px;color:#fff;background:#7564e8;font-size:11px}.wrap{max-width:86%}.bubble{padding:11px 13px;border:1px solid #e5e2e9;border-radius:7px 17px 17px 17px;background:#fff;box-shadow:0 4px 13px #332c4d0a;line-height:1.48;white-space:pre-wrap}.me .bubble{border-color:#d9d2ff;border-radius:17px 7px 17px 17px;color:#302960;background:#e9e4ff}.time{text-align:right;margin-top:4px;color:#a29ca9;font-size:8px}.task{min-width:min(78vw,430px);margin-top:7px;padding:13px;border:1px solid #dfdbea;border-radius:15px;background:#fff;box-shadow:0 7px 20px #322b4c0d}.task.done{opacity:.55}.task.done h3{text-decoration:line-through}.task-head{display:flex;gap:9px}.spark{width:34px;height:34px;flex:none;display:grid;place-items:center;border-radius:11px;color:#6658cc;background:#eeebff}.task small{color:#918b9c;font-size:8px;font-weight:800;text-transform:uppercase}.task h3{margin:3px 0 0;font-size:12px;line-height:1.35}.meta{margin:9px 0;color:#8c8696;font-size:9px}.actions{display:flex;gap:7px;flex-wrap:wrap}.actions button,.attach{padding:8px 10px;border:1px solid #ddd8e8;border-radius:9px;color:#625b74;background:#faf9fc;font-size:9px;font-weight:700}.actions .primary{border-color:#7564e8;color:white;background:#7564e8}.actions .danger{color:#a8465a}.typing{display:flex;gap:4px;padding:12px 14px;border:1px solid #e5e2e9;border-radius:7px 17px 17px 17px;background:#fff}.typing i{width:6px;height:6px;border-radius:50%;background:#8f8999;animation:b 1s infinite alternate}.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}@keyframes b{to{opacity:.3;transform:translateY(-3px)}}.status{min-height:0;margin:0 12px 8px;padding:0;color:#6e62c9;font-size:10px;text-align:center}.status:empty{display:none}.chips{display:flex;gap:7px;overflow:auto;padding:0 11px 8px;scrollbar-width:none}.chips button{white-space:nowrap;padding:7px 10px;border:1px solid #ddd9e5;border-radius:10px;color:#716b7c;background:#fff;font-size:9px}.composer{height:59px;display:flex;align-items:center;gap:5px;margin:0 10px max(10px,env(safe-area-inset-bottom));padding:7px;border:1px solid #dcd7e5;border-radius:18px;background:#fff;box-shadow:0 8px 27px #30274c17}.composer input{min-width:0;flex:1;height:100%;border:0;outline:0;background:transparent;font-size:14px}.composer button,.composer label{width:37px;height:37px;display:grid;place-items:center;flex:none;border:0;border-radius:11px;color:#827b8f;background:transparent;font-size:17px}.composer .send{width:43px;height:43px;color:#fff;background:#7564e8}.drawer{position:fixed;z-index:10;inset:0;background:#faf9fe;display:none;overflow:auto;padding:calc(18px + env(safe-area-inset-top)) 15px 30px}.drawer.open{display:block}.drawer-top{display:flex;align-items:center;gap:12px}.drawer-top button{width:38px;height:38px;border:0;border-radius:11px;background:#efedf4}.drawer h2{margin:0;font-size:18px}.search{display:flex;margin:20px 0 10px;padding:5px;border:1px solid #ded9e7;border-radius:12px;background:#fff}.search input{width:100%;padding:10px;border:0;outline:0;background:transparent}.filters{display:flex;gap:7px;overflow:auto;margin-bottom:12px}.filters button{padding:8px 11px;border:1px solid #ddd8e8;border-radius:9px;background:#fff;font-size:10px}.filters .active{color:white;background:#7564e8}.list{display:grid;gap:9px}.list .task{min-width:0;margin:0}.empty{text-align:center;color:#8f8999;padding:50px 20px}.legal{display:flex;justify-content:center;gap:15px;margin-top:25px;font-size:10px}.test{width:100%;margin-top:16px;padding:11px;border:0;border-radius:11px;color:#fff;background:#302b43}
</style></head><body><main class="app"><header class="top"><div class="avatar">✦</div><div><h1>Brainy</h1><p><i class="online"></i>Your personal assistant</p></div><button id="menu" aria-label="Responsibilities">☰</button></header><section class="feed" id="feed"><div class="day">TODAY</div><div id="messages"></div><div id="typing"></div></section><div class="status" id="status"></div><div class="chips"><button data-prompt="Remind me about my meeting tomorrow at 10 AM">Meeting tomorrow</button><button data-prompt="Pay ₹15,000 rent today at 9 PM">Pay rent</button><button data-prompt="What is pending?">What is pending?</button></div><form class="composer" id="form"><label>📎<input id="image" type="file" accept="image/*" hidden></label><input id="input" autocomplete="off" placeholder="Message Brainy…"><button type="button" id="voice">🎙</button><button class="send" id="send">➤</button></form></main>
<aside class="drawer" id="drawer"><div class="drawer-top"><button id="back">‹</button><div><small>YOUR RESPONSIBILITIES</small><h2>Everything on track</h2></div></div><div class="search"><input id="search" placeholder="Search responsibilities…"></div><div class="filters" id="filters"><button class="active" data-filter="open">Open</button><button data-filter="today">Today</button><button data-filter="overdue">Overdue</button><button data-filter="all">All</button></div><div class="list" id="list"></div><button class="test" id="test">Test notification in 5 seconds</button><div class="legal"><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a></div></aside>
<script>
const URL='https://giekqnaiugezpkcypsux.supabase.co/functions/v1/understand',KEY='sb_publishable_OxeYG8OJvLs27rHbuznujQ_rMcVlwQ9';
let tasks=JSON.parse(localStorage.getItem('brainy.tasks')||'[]'),messages=JSON.parse(localStorage.getItem('brainy.messages')||'[]'),filter='open',query='';const $=id=>document.getElementById(id);
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function when(d){if(!d)return'Time not set';const x=new Date(d);return isNaN(x)?'Time not set':x.toLocaleString([],{dateStyle:'medium',timeStyle:'short'})}function save(){localStorage.setItem('brainy.tasks',JSON.stringify(tasks));localStorage.setItem('brainy.messages',JSON.stringify(messages));render();}
function action(t){const e=t.entities||{};if(t.proposedAction==='email'&&e.emailAddress)return'mailto:'+e.emailAddress+'?subject='+encodeURIComponent(e.subject||t.title)+'&body='+encodeURIComponent(e.draftBody||'');if(t.proposedAction==='whatsapp'&&e.phoneNumber)return'https://wa.me/'+e.phoneNumber.replace(/\D/g,'')+'?text='+encodeURIComponent(e.draftBody||'');if((t.proposedAction==='call'||t.proposedAction==='phone_call')&&e.phoneNumber)return'tel:'+e.phoneNumber;if(t.proposedAction==='payment'||t.proposedAction==='upi_payment')return'upi://pay?pn='+encodeURIComponent(e.contactName||'Payee')+'&am='+encodeURIComponent(e.amount||'');if(e.location)return'geo:0,0?q='+encodeURIComponent(e.location);if(e.url)return e.url;return''}function label(t){return t.proposedAction==='email'?'Open Gmail':t.proposedAction==='whatsapp'?'Open WhatsApp':(t.proposedAction==='payment'||t.proposedAction==='upi_payment')?'Open GPay':t.proposedAction==='meeting'?'Join meeting':t.proposedAction==='call'?'Call now':'Open app'}
function taskCard(t){const a=action(t);return'<article class="task '+(t.done?'done':'')+'"><div class="task-head"><div class="spark">✦</div><div><small>'+esc(t.type||'General')+'</small><h3>'+esc(t.title)+'</h3></div></div><div class="meta">'+esc(when(t.dueAt))+(t.recurrence?' · Repeats '+esc(t.recurrence):'')+'</div><div class="actions">'+(a?'<button class="primary" onclick="openAction(\''+encodeURIComponent(a)+'\')">'+label(t)+'</button>':'')+'<button onclick="done(\''+t.id+'\')">'+(t.done?'Reopen':'✓ Complete')+'</button><button onclick="editTask(\''+t.id+'\')">Edit</button><button class="danger" onclick="removeTask(\''+t.id+'\')">Delete</button></div></article>'}
function add(role,text,taskId){messages.push({id:crypto.randomUUID(),role,text,taskId,at:new Date().toISOString()});save();setTimeout(()=>{$('feed').scrollTop=$('feed').scrollHeight},20)}function messageHtml(m){const t=m.taskId?tasks.find(x=>x.id===m.taskId):null;return'<div class="msg '+(m.role==='user'?'me':'')+'">'+(m.role==='brainy'?'<div class="mini">✦</div>':'')+'<div class="wrap"><div class="bubble">'+esc(m.text)+'</div>'+(t?taskCard(t):'')+'<div class="time">'+new Date(m.at).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})+(m.role==='user'?' ✓':'')+'</div></div></div>'}
function visible(t){const due=t.dueAt?new Date(t.dueAt).getTime():0,now=Date.now(),today=new Date();today.setHours(0,0,0,0);const tomorrow=+today+86400000;if(query&&!JSON.stringify(t).toLowerCase().includes(query))return false;if(filter==='open')return!t.done;if(filter==='today')return!t.done&&due>=+today&&due<tomorrow;if(filter==='overdue')return!t.done&&due&&due<now;return true}function render(){$('messages').innerHTML=messages.map(messageHtml).join('');const shown=tasks.filter(visible);$('list').innerHTML=shown.length?shown.map(taskCard).join(''):'<div class="empty">No matching responsibilities.</div>'}
window.openAction=x=>{const u=decodeURIComponent(x);if(window.BrainyAndroid)BrainyAndroid.openExternal(u);else location.href=u};window.done=id=>{const t=tasks.find(x=>x.id===id);if(!t)return;if(t.done){t.done=false}else{t.lastCompletedAt=new Date().toISOString();if(t.recurrence){const d=new Date(t.dueAt||Date.now());String(t.recurrence).includes('week')?d.setDate(d.getDate()+7):String(t.recurrence).includes('month')?d.setMonth(d.getMonth()+1):d.setDate(d.getDate()+1);t.dueAt=d.toISOString();t.done=false;schedule(t)}else t.done=true}if(window.BrainyAndroid)BrainyAndroid.completeTask(id);save()};window.removeTask=id=>{if(!confirm('Delete this responsibility?'))return;tasks=tasks.filter(t=>t.id!==id);if(window.BrainyAndroid)BrainyAndroid.deleteTask(id);save()};window.editTask=id=>{const t=tasks.find(x=>x.id===id);if(!t)return;const title=prompt('Responsibility',t.title);if(title===null)return;const due=prompt('Due date and time',t.dueAt?new Date(t.dueAt).toLocaleString():'');t.title=title.trim()||t.title;if(due&&!isNaN(new Date(due)))t.dueAt=new Date(due).toISOString();t.done=false;schedule(t);save()};
function schedule(t){if(!window.BrainyAndroid||!t.dueAt)return;const at=new Date(t.dueAt).getTime();if(at>Date.now()){t.dueAtMs=at;t.actionUrl=action(t);t.actionLabel=label(t);BrainyAndroid.scheduleJourney(JSON.stringify(t))}}async function understand(text){const ctl=new AbortController(),timer=setTimeout(()=>ctl.abort(),25000);try{const r=await fetch(URL,{method:'POST',headers:{'Content-Type':'application/json',apikey:KEY,Authorization:'Bearer '+KEY},body:JSON.stringify({text,timezone:Intl.DateTimeFormat().resolvedOptions().timeZone,now:new Date().toISOString()}),signal:ctl.signal});if(!r.ok)throw Error();return{...await r.json(),understoodBy:'OpenAI'}}finally{clearTimeout(timer)}}
function naturalUpdate(text){const latest=tasks.find(t=>!t.done);if(!latest)return false;if(/move (it|this).*(tomorrow)/i.test(text)){const d=latest.dueAt?new Date(latest.dueAt):new Date();d.setDate(d.getDate()+1);if(!latest.dueAt)d.setHours(9,0,0,0);latest.dueAt=d.toISOString();schedule(latest);add('brainy','Sure — I moved “'+latest.title+'” to '+when(latest.dueAt)+'.');return true}if(/(cancel|delete) (it|this)/i.test(text)){tasks=tasks.filter(t=>t.id!==latest.id);if(window.BrainyAndroid)BrainyAndroid.deleteTask(latest.id);add('brainy','Okay — I cancelled “'+latest.title+'”.');return true}if(/(complete|done with) (it|this)/i.test(text)){done(latest.id);add('brainy','Done — I marked “'+latest.title+'” as completed.');return true}if(/what (is|'s) pending/i.test(text)){const open=tasks.filter(t=>!t.done);add('brainy',open.length?'You have '+open.length+' open responsibilities. I’ve listed the most urgent ones in Responsibilities.':'Nothing is pending. You’re all caught up.');return true}return false}
$('form').onsubmit=async e=>{e.preventDefault();const text=$('input').value.trim();if(!text)return;$('input').value='';add('user',text);$('typing').innerHTML='<div class="msg"><div class="mini">✦</div><div class="typing"><i></i><i></i><i></i></div></div>';$('send').disabled=true;try{if(naturalUpdate(text))return;let t;try{t=await understand(text)}catch(_){t={type:'general',title:text,dueAt:null,recurrence:null,understoodBy:'Local'}}t={...t,id:crypto.randomUUID(),sourceText:text,createdAt:new Date().toISOString(),done:false};schedule(t);tasks.unshift(t);const count=t.plan?t.plan.length:0;add('brainy',t.needsClarification&&t.clarificationQuestion?t.clarificationQuestion:'Got it — I’ll remember this. '+(t.dueAt?'It is planned for '+when(t.dueAt)+'. ':'Tell me the date or time whenever you know it. ')+(count?'I created '+count+' reminders and will follow up until it is done.':'I kept it safely in your inbox.'),t.id)}finally{$('typing').innerHTML='';$('send').disabled=false;render()}};
$('voice').onclick=()=>{if(window.BrainyAndroid){$('status').textContent='Listening…';BrainyAndroid.startVoiceInput()}else $('status').textContent='Voice requires Android.'};window.voiceResult=(text,error)=>{if(error){$('status').textContent='Voice capture cancelled.';return}$('input').value=text;$('status').textContent='Voice captured. Review and send.'};$('image').onchange=e=>{const f=e.target.files[0];if(!f)return;$('status').textContent='Reading image text…';const r=new FileReader();r.onload=()=>window.BrainyAndroid?BrainyAndroid.recognizeImage(r.result):0;r.readAsDataURL(f)};window.ocrResult=(text,error)=>{if(error||!text){$('status').textContent='No readable text found.';return}$('input').value=($('input').value+' '+text).trim();$('status').textContent='Text extracted. Review and send.'};window.receiveShare=(text,type)=>{$('input').value=($('input').value+' '+text).trim();$('status').textContent='Shared content received.'};
$('menu').onclick=()=>$('drawer').classList.add('open');$('back').onclick=()=>$('drawer').classList.remove('open');$('search').oninput=e=>{query=e.target.value.toLowerCase();render()};$('filters').onclick=e=>{if(!e.target.dataset.filter)return;filter=e.target.dataset.filter;[...$('filters').children].forEach(x=>x.classList.toggle('active',x.dataset.filter===filter));render()};document.querySelector('.chips').onclick=e=>{if(e.target.dataset.prompt)$('input').value=e.target.dataset.prompt};$('test').onclick=()=>{if(window.BrainyAndroid){BrainyAndroid.scheduleNotification('Brainy is ready','Native notifications are working.',Date.now()+5000,'');$('status').textContent='Test reminder scheduled for 5 seconds.'}};
try{if(window.BrainyAndroid){const native=JSON.parse(BrainyAndroid.nativeTasks()||'{}');tasks=tasks.map(t=>native[t.id]?{...t,done:native[t.id].done||false,lastCompletedAt:native[t.id].lastCompletedAt||t.lastCompletedAt,dueAt:native[t.id].dueAt||t.dueAt}:t)}}catch(_){}if(!messages.length)add('brainy',(new Date().getHours()<12?'Good morning':new Date().getHours()<18?'Good afternoon':'Good evening')+', Divya. Tell me anything you need to remember or get done.');render();setTimeout(()=>{$('feed').scrollTop=$('feed').scrollHeight},50);
</script></body></html>
