<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#faf9fe"><title>Brainy</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#faf9fe;color:#24223b;font:15px system-ui,-apple-system,sans-serif}.app{max-width:720px;margin:auto;min-height:100vh;padding:calc(20px + env(safe-area-inset-top)) 18px 100px}.top{display:flex;justify-content:space-between;align-items:center}.brand{font-size:25px;font-weight:800}.brand i{font-style:normal;color:#7564e8}.pill{font-size:12px;color:#267452;background:#e9f8ef;padding:8px 11px;border-radius:20px}.hero{margin:34px 0 20px}.hero small{color:#857da0;text-transform:uppercase;letter-spacing:2px;font-weight:700}.hero h1{font-family:Georgia,serif;font-size:42px;line-height:1.05;margin:12px 0}.capture{background:linear-gradient(135deg,#eeeaff,#fff);border:1px solid #ddd7fb;border-radius:24px;padding:18px;box-shadow:0 18px 45px #4d397b12}.capture h2{font-size:17px;margin:0 0 5px}.capture p{color:#88819b;margin:0 0 15px}.row{display:flex;background:white;border:1px solid #dfdbea;border-radius:16px;padding:6px}.row input{flex:1;border:0;outline:0;font-size:16px;padding:13px;background:transparent;min-width:0}.row button,.primary{border:0;background:#7564e8;color:white;border-radius:12px;padding:12px 17px;font-weight:700}.status{min-height:22px;margin:10px 4px 0;color:#7564e8;font-size:13px}.section{margin-top:26px}.section-head{display:flex;justify-content:space-between;align-items:center}.section h2{font-size:21px}.list{display:grid;gap:12px}.card{background:white;border:1px solid #e8e5f0;border-radius:18px;padding:16px;box-shadow:0 8px 25px #40386c08}.card-top{display:flex;gap:12px}.spark{width:38px;height:38px;border-radius:12px;background:#eeeaff;display:grid;place-items:center;color:#7564e8;flex:none}.title{font-weight:750;line-height:1.35}.meta{font-size:12px;color:#8a8498;margin-top:5px}.actions{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}.actions button{border:1px solid #ddd8ef;background:#faf9fe;color:#5f5683;border-radius:10px;padding:8px 11px}.actions .done{background:#eaf8f0;color:#267452;border-color:#ccebd9}.empty{text-align:center;color:#918aa2;padding:40px 10px}.test{position:fixed;right:18px;bottom:20px;border:0;border-radius:50px;padding:13px 17px;background:#28233f;color:#fff;box-shadow:0 8px 25px #0003}button:disabled{opacity:.5}
</style></head><body><main class="app"><div class="top"><div class="brand"><i>✦</i> brainy</div><span class="pill">● Android ready</span></div>
<section class="hero"><small>Your personal operating system</small><h1 id="greeting">Good morning.</h1><p>Say it once. I’ll remember and follow through.</p></section>
<section class="capture"><h2>What’s on your mind?</h2><p>Type anything. Brainy will understand, plan and remember it.</p><form class="row" id="form"><input id="input" autocomplete="off" placeholder="Remind me, help me, remember this…"><button id="send">➤</button></form><div class="status" id="status"></div></section>
<section class="section"><div class="section-head"><h2>Up next</h2><span id="count"></span></div><div class="list" id="list"></div></section>
<button class="test" id="test">Test notification</button></main>
<script>
const URL='https://giekqnaiugezpkcypsux.supabase.co/functions/v1/understand';
const KEY='sb_publishable_OxeYG8OJvLs27rHbuznujQ_rMcVlwQ9';
let tasks=JSON.parse(localStorage.getItem('brainy.tasks')||'[]');
const $=id=>document.getElementById(id);
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function save(){localStorage.setItem('brainy.tasks',JSON.stringify(tasks));render()}
function when(d){if(!d)return'Needs planning';const x=new Date(d);return isNaN(x)?'Needs planning':x.toLocaleString([], {dateStyle:'medium',timeStyle:'short'})}
function action(t){const e=t.entities||{};if(t.proposedAction==='email'&&e.emailAddress)return 'mailto:'+e.emailAddress+'?subject='+encodeURIComponent(e.subject||t.title);
if(t.proposedAction==='whatsapp'&&e.phoneNumber)return 'https://wa.me/'+e.phoneNumber.replace(/\D/g,'')+'?text='+encodeURIComponent(e.draftBody||'');
if(t.proposedAction==='call'&&e.phoneNumber)return'tel:'+e.phoneNumber;
if(t.proposedAction==='payment'&&e.phoneNumber)return'upi://pay?pa='+encodeURIComponent(e.phoneNumber)+'&am='+encodeURIComponent(e.amount||'');
if(e.location)return'geo:0,0?q='+encodeURIComponent(e.location);return''}
function render(){const open=tasks.filter(t=>!t.done);$('count').textContent=open.length+' open';$('list').innerHTML=open.length?open.map(t=>{const a=action(t);return '<article class="card"><div class="card-top"><div class="spark">✦</div><div><div class="title">'+esc(t.title)+'</div><div class="meta">'+esc(t.type||'General')+' · '+esc(when(t.dueAt))+' · '+esc(t.understoodBy||'OpenAI')+'</div></div></div>'+(t.clarificationQuestion?'<div class="meta">'+esc(t.clarificationQuestion)+'</div>':'')+'<div class="actions">'+(a?'<button onclick="openAction(\''+encodeURIComponent(a)+'\')">Open app</button>':'')+'<button class="done" onclick="done(\''+t.id+'\')">Complete</button></div></article>'}).join(''):'<div class="empty">Nothing pending. Tell Brainy what you need to remember.</div>'}
window.done=id=>{tasks=tasks.map(t=>t.id===id?{...t,done:true}:t);if(window.BrainyAndroid)BrainyAndroid.completeTask(id);save()}
window.openAction=x=>{const url=decodeURIComponent(x);if(window.BrainyAndroid)BrainyAndroid.openExternal(url);else location.href=url}
function schedule(t){if(!window.BrainyAndroid||!t.dueAt)return;const at=new Date(t.dueAt).getTime();if(at>Date.now()){t.dueAtMs=at;t.actionUrl=action(t);t.actionLabel=t.proposedAction==='email'?'Open Gmail':t.proposedAction==='whatsapp'?'Open WhatsApp':t.proposedAction==='payment'?'Open GPay':t.proposedAction==='call'?'Call now':'Open app';BrainyAndroid.scheduleJourney(JSON.stringify(t))}}
async function understand(text){const ctl=new AbortController(),timer=setTimeout(()=>ctl.abort(),25000);try{const r=await fetch(URL,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY},body:JSON.stringify({text,timezone:Intl.DateTimeFormat().resolvedOptions().timeZone,now:new Date().toISOString()}),signal:ctl.signal});if(!r.ok)throw Error('AI unavailable');return {...await r.json(),understoodBy:'OpenAI'}}finally{clearTimeout(timer)}}
$('form').onsubmit=async e=>{e.preventDefault();const text=$('input').value.trim();if(!text)return;$('send').disabled=true;$('status').textContent='Brainy is understanding…';try{let t;try{t=await understand(text)}catch(_){t={type:'general',title:text,description:text,dueAt:null,understoodBy:'Local'}}t={...t,id:crypto.randomUUID(),sourceText:text,createdAt:new Date().toISOString(),done:false};schedule(t);tasks.unshift(t);save();$('input').value='';$('status').textContent=t.understoodBy+' understood this'+(t.dueAt?' and scheduled it.':'.')}catch(err){$('status').textContent='Could not save. Please try again.'}finally{$('send').disabled=false}}
$('test').onclick=()=>{if(window.BrainyAndroid){BrainyAndroid.scheduleNotification('Brainy is ready','Native Android notifications are working.',Date.now()+5000,'');$('status').textContent='Test notification scheduled for 5 seconds.'}else $('status').textContent='Native bridge unavailable.'}
function agenda(){if(window.BrainyAndroid){$('todayAgenda').textContent=BrainyAndroid.nativeAgenda(false);$('tomorrowAgenda').textContent=BrainyAndroid.nativeAgenda(true)}else{$('todayAgenda').textContent='Available in the Android app.';$('tomorrowAgenda').textContent='Available in the Android app.'}}\nconst h=new Date().getHours();$('greeting').textContent=h<12?'Good morning.':h<18?'Good afternoon.':'Good evening.';render();agenda();
</script></body></html>
