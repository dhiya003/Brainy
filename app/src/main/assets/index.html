<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#faf9fe"><title>Brainy</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#faf9fe;color:#24223b;font:15px system-ui,-apple-system,sans-serif}.app{max-width:720px;margin:auto;min-height:100vh;padding:calc(20px + env(safe-area-inset-top)) 18px 100px}.top{display:flex;justify-content:space-between;align-items:center}.brand{font-size:25px;font-weight:800}.brand i{font-style:normal;color:#7564e8}.pill{font-size:12px;color:#267452;background:#e9f8ef;padding:8px 11px;border-radius:20px}.hero{margin:34px 0 20px}.hero small{color:#857da0;text-transform:uppercase;letter-spacing:2px;font-weight:700}.hero h1{font-family:Georgia,serif;font-size:42px;line-height:1.05;margin:12px 0}.capture{background:linear-gradient(135deg,#eeeaff,#fff);border:1px solid #ddd7fb;border-radius:24px;padding:18px;box-shadow:0 18px 45px #4d397b12}.capture h2{font-size:17px;margin:0 0 5px}.capture p{color:#88819b;margin:0 0 15px}.row{display:flex;background:white;border:1px solid #dfdbea;border-radius:16px;padding:6px}.row input{flex:1;border:0;outline:0;font-size:16px;padding:13px;background:transparent;min-width:0}.row button,.primary{border:0;background:#7564e8;color:white;border-radius:12px;padding:12px 17px;font-weight:700}.status{min-height:22px;margin:10px 4px 0;color:#7564e8;font-size:13px}.section{margin-top:26px}.section-head{display:flex;justify-content:space-between;align-items:center}.section h2{font-size:21px}.list{display:grid;gap:12px}.card{background:white;border:1px solid #e8e5f0;border-radius:18px;padding:16px;box-shadow:0 8px 25px #40386c08}.card-top{display:flex;gap:12px}.spark{width:38px;height:38px;border-radius:12px;background:#eeeaff;display:grid;place-items:center;color:#7564e8;flex:none}.title{font-weight:750;line-height:1.35}.meta{font-size:12px;color:#8a8498;margin-top:5px}.actions{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}.actions button{border:1px solid #ddd8ef;background:#faf9fe;color:#5f5683;border-radius:10px;padding:8px 11px}.actions .done{background:#eaf8f0;color:#267452;border-color:#ccebd9}.attach{border:1px solid #ddd8ef;background:#faf9fe;color:#5f5683;border-radius:10px;padding:8px 11px}.danger{color:#a63c52!important}.active{background:#7564e8!important;color:white!important}.empty{text-align:center;color:#918aa2;padding:40px 10px}.test{position:fixed;right:18px;bottom:20px;border:0;border-radius:50px;padding:13px 17px;background:#28233f;color:#fff;box-shadow:0 8px 25px #0003}button:disabled{opacity:.5}
</style></head><body><main class="app"><div class="top"><div class="brand"><i>✦</i> brainy</div><span class="pill">● Android ready</span></div>
<section class="hero"><small>Your personal operating system</small><h1 id="greeting">Good morning.</h1><p>Say it once. I’ll remember and follow through.</p><button class="primary" id="seed">Reload test data</button></section>
<section class="capture"><h2>What’s on your mind?</h2><p>Type anything. Brainy will understand, plan and remember it.</p><form class="row" id="form"><input id="input" autocomplete="off" placeholder="Remind me, help me, remember this…"><button id="send">➤</button></form><div class="actions"><button type="button" id="voice">🎙 Voice</button><label class="attach">📷 Image / OCR<input id="image" type="file" accept="image/*" hidden></label></div><div class="status" id="status"></div></section>
<section class="section"><div class="section-head"><h2>Responsibilities</h2><span id="count"></span></div><div class="row"><input id="search" placeholder="Search responsibilities…"></div><div class="actions" id="filters"><button data-filter="open">Open</button><button data-filter="today">Today</button><button data-filter="overdue">Overdue</button><button data-filter="all">All</button></div><div class="list" id="list"></div></section><section class="section"><div class="section-head"><h2>Completed history</h2></div><div class="list" id="history"></div></section>
<button class="test" id="test">Test notification</button></main>
<script>
const URL='https://giekqnaiugezpkcypsux.supabase.co/functions/v1/understand',KEY='sb_publishable_OxeYG8OJvLs27rHbuznujQ_rMcVlwQ9';
let tasks=JSON.parse(localStorage.getItem('brainy.tasks')||'[]'),filter='open',query='';const $=id=>document.getElementById(id);
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function save(){localStorage.setItem('brainy.tasks',JSON.stringify(tasks));render();agenda()}
function when(d){if(!d)return'Needs planning';const x=new Date(d);return isNaN(x)?'Needs planning':x.toLocaleString([],{dateStyle:'medium',timeStyle:'short'})}
function action(t){const e=t.entities||{};if(t.proposedAction==='email'&&e.emailAddress)return'mailto:'+e.emailAddress+'?subject='+encodeURIComponent(e.subject||t.title);if(t.proposedAction==='whatsapp'&&e.phoneNumber)return'https://wa.me/'+e.phoneNumber.replace(/\D/g,'')+'?text='+encodeURIComponent(e.draftBody||'');if(t.proposedAction==='call'&&e.phoneNumber)return'tel:'+e.phoneNumber;if(t.proposedAction==='payment')return'upi://pay?pn='+encodeURIComponent(e.contactName||'Payee')+'&am='+encodeURIComponent(e.amount||'');if(e.location)return'geo:0,0?q='+encodeURIComponent(e.location);return''}
function visible(t){const due=t.dueAt?new Date(t.dueAt).getTime():0,now=Date.now(),today=new Date();today.setHours(0,0,0,0);const tomorrow=+today+86400000;if(query&&!JSON.stringify(t).toLowerCase().includes(query))return false;if(filter==='open')return!t.done;if(filter==='today')return!t.done&&due>=+today&&due<tomorrow;if(filter==='overdue')return!t.done&&due&&due<now;if(filter==='all')return true;return true}
function card(t){const a=action(t),rec=t.recurrence&&t.recurrence!=='null'?' · Repeats '+t.recurrence:'';return'<article class="card"><div class="card-top"><div class="spark">✦</div><div><div class="title">'+esc(t.title)+'</div><div class="meta">'+esc(t.type||'General')+' · '+esc(when(t.dueAt))+rec+' · '+esc(t.understoodBy||'OpenAI')+'</div></div></div><div class="actions">'+(a?'<button onclick="openAction(\''+encodeURIComponent(a)+'\')">'+esc(t.actionLabel||'Open app')+'</button>':'')+'<button onclick="editTask(\''+t.id+'\')">Edit</button><button class="done" onclick="done(\''+t.id+'\')">Complete</button><button class="danger" onclick="removeTask(\''+t.id+'\')">Delete</button></div></article>'}
function render(){const shown=tasks.filter(visible),completed=tasks.filter(t=>t.done||t.lastCompletedAt);$('count').textContent=tasks.filter(t=>!t.done).length+' open';$('list').innerHTML=shown.length?shown.map(card).join(''):'<div class="empty">No matching responsibilities.</div>';$('history').innerHTML=completed.length?completed.map(t=>'<article class="card"><div class="title">'+esc(t.title)+'</div><div class="meta">Completed '+esc(when(t.lastCompletedAt||t.completedAt))+(t.recurrence?' · Recurring':'')+'</div></article>').join(''):'<div class="empty">Completed responsibilities will appear here.</div>'}
window.done=id=>{const t=tasks.find(x=>x.id===id);if(!t)return;t.lastCompletedAt=new Date().toISOString();if(t.recurrence&&t.recurrence!=='null'){const d=new Date(t.dueAt||Date.now());if(String(t.recurrence).includes('week'))d.setDate(d.getDate()+7);else if(String(t.recurrence).includes('month'))d.setMonth(d.getMonth()+1);else d.setDate(d.getDate()+1);t.dueAt=d.toISOString();t.done=false}else{t.done=true;t.completedAt=new Date().toISOString()}if(window.BrainyAndroid)BrainyAndroid.completeTask(id);save()}
window.removeTask=id=>{if(!confirm('Delete this responsibility?'))return;tasks=tasks.filter(t=>t.id!==id);if(window.BrainyAndroid)BrainyAndroid.deleteTask(id);save()}
window.editTask=id=>{const t=tasks.find(x=>x.id===id);if(!t)return;const title=prompt('Responsibility',t.title);if(title===null)return;const due=prompt('Due date and time (example: 2026-07-14 10:00)',t.dueAt?new Date(t.dueAt).toLocaleString():'');t.title=title.trim()||t.title;if(due&& !isNaN(new Date(due)))t.dueAt=new Date(due).toISOString();t.done=false;schedule(t);save()}
window.openAction=x=>{const u=decodeURIComponent(x);if(window.BrainyAndroid)BrainyAndroid.openExternal(u);else location.href=u}
function schedule(t){if(!window.BrainyAndroid||!t.dueAt)return;const at=new Date(t.dueAt).getTime();if(at>Date.now()){t.dueAtMs=at;t.actionUrl=action(t);t.actionLabel=t.proposedAction==='email'?'Open Gmail':t.proposedAction==='whatsapp'?'Open WhatsApp':t.proposedAction==='payment'?'Open GPay':t.proposedAction==='call'?'Call now':'Open app';BrainyAndroid.scheduleJourney(JSON.stringify(t))}}
async function understand(text){const ctl=new AbortController(),timer=setTimeout(()=>ctl.abort(),25000);try{const r=await fetch(URL,{method:'POST',headers:{'Content-Type':'application/json',apikey:KEY,Authorization:'Bearer '+KEY},body:JSON.stringify({text,timezone:Intl.DateTimeFormat().resolvedOptions().timeZone,now:new Date().toISOString()}),signal:ctl.signal});if(!r.ok)throw Error();return{...await r.json(),understoodBy:'OpenAI'}}finally{clearTimeout(timer)}}
function naturalUpdate(text){const latest=tasks.find(t=>!t.done);if(!latest)return false;if(/move (it|this).*(tomorrow)/i.test(text)){const d=latest.dueAt?new Date(latest.dueAt):new Date();d.setDate(d.getDate()+1);if(!latest.dueAt)d.setHours(9,0,0,0);latest.dueAt=d.toISOString();schedule(latest);$('status').textContent='Moved “'+latest.title+'” to tomorrow.';save();return true}if(/(cancel|delete) (it|this)/i.test(text)){removeTask(latest.id);return true}if(/(complete|done with) (it|this)/i.test(text)){done(latest.id);return true}return false}
$('form').onsubmit=async e=>{e.preventDefault();const text=$('input').value.trim();if(!text)return;if(naturalUpdate(text)){$('input').value='';return}$('send').disabled=true;$('status').textContent='Brainy is understanding…';try{let t;try{t=await understand(text)}catch(_){t={type:'general',title:text,description:text,dueAt:null,recurrence:null,understoodBy:'Local'}}t={...t,id:crypto.randomUUID(),sourceText:text,createdAt:new Date().toISOString(),done:false};schedule(t);tasks.unshift(t);save();$('input').value='';$('status').textContent=t.understoodBy+' understood and saved this.'}finally{$('send').disabled=false}}
$('voice').onclick=()=>{if(window.BrainyAndroid){$('status').textContent='Listening…';BrainyAndroid.startVoiceInput()}else $('status').textContent='Voice requires Android.'}
window.voiceResult=(text,error)=>{if(error){$('status').textContent='Voice capture cancelled.';return}$('input').value=text;$('status').textContent='Voice captured. Review and send.'}
$('image').onchange=e=>{const f=e.target.files[0];if(!f)return;$('status').textContent='Reading image text…';const r=new FileReader();r.onload=()=>{if(window.BrainyAndroid)BrainyAndroid.recognizeImage(r.result);else $('status').textContent='OCR requires Android.'};r.readAsDataURL(f)}
window.ocrResult=(text,error)=>{if(error||!text){$('status').textContent='No readable text found.';return}$('input').value=($('input').value+' '+text).trim();$('status').textContent='Text extracted from image. Review and send.'}
window.receiveShare=(text,type)=>{$('input').value=($('input').value+' '+text).trim();$('status').textContent='Shared content received. Review and send.'}
$('search').oninput=e=>{query=e.target.value.toLowerCase();render()};$('filters').onclick=e=>{if(!e.target.dataset.filter)return;filter=e.target.dataset.filter;[...$('filters').children].forEach(x=>x.classList.toggle('active',x.dataset.filter===filter));render()}
$('test').onclick=()=>{if(window.BrainyAndroid){BrainyAndroid.scheduleNotification('Brainy is ready','Native notifications are working.',Date.now()+5000,'');$('status').textContent='Test notification scheduled for 5 seconds.'}}
function agenda(){if(window.BrainyAndroid){$('todayAgenda').textContent=BrainyAndroid.nativeAgenda(false);$('tomorrowAgenda').textContent=BrainyAndroid.nativeAgenda(true)}}
try{if(window.BrainyAndroid){const native=JSON.parse(BrainyAndroid.nativeTasks()||'{}');tasks=tasks.map(t=>native[t.id]?{...t,done:native[t.id].done||false,lastCompletedAt:native[t.id].lastCompletedAt||t.lastCompletedAt,dueAt:native[t.id].dueAt||t.dueAt}:t);localStorage.setItem('brainy.tasks',JSON.stringify(tasks))}}catch(_){}
function seedTestData(force=false){if(tasks.length&&!force)return;const now=new Date(),at=(days,h,m=0)=>{const d=new Date(now);d.setDate(d.getDate()+days);d.setHours(h,m,0,0);return d.toISOString()},base={createdAt:now.toISOString(),done:false,understoodBy:'OpenAI'};const data=[
{...base,id:'test-meeting',type:'meeting',title:'[TEST] Product review meeting',dueAt:at(1,10),proposedAction:'meeting',entities:{url:'https://meet.google.com/'}},
{...base,id:'test-rent',type:'payment',title:'[TEST] Pay ₹15,000 rent',dueAt:at(0,21,30),proposedAction:'payment',entities:{contactName:'Owner',amount:15000,currency:'INR'}},
{...base,id:'test-email',type:'email',title:'[TEST] Email monthly report to Ravi',dueAt:at(0,22),proposedAction:'email',entities:{contactName:'Ravi',emailAddress:'ravi@example.com',subject:'Monthly project report',draftBody:'Hi Ravi, please find the monthly report attached.'}},
{...base,id:'test-whatsapp',type:'message',title:'[TEST] WhatsApp supplier about delivery',dueAt:at(1,9),proposedAction:'whatsapp',entities:{phoneNumber:'+919876543210',draftBody:'Hello, please confirm tomorrow’s delivery.'}},
{...base,id:'test-overdue',type:'deadline',title:'[TEST] Submit overdue document',dueAt:at(-1,17),proposedAction:'none',entities:{}},
{...base,id:'test-completed',type:'shopping',title:'[TEST] Buy baby supplies',dueAt:at(-1,12),done:true,completedAt:at(-1,13),proposedAction:'none',entities:{}},
{...base,id:'test-recurring',type:'habit',title:'[TEST] Weekly project review',dueAt:at(2,19),recurrence:'weekly',proposedAction:'none',entities:{}}
];const ids=new Set(data.map(x=>x.id));tasks=force?tasks.filter(t=>!ids.has(t.id)):tasks;data.forEach(t=>{if(!tasks.some(x=>x.id===t.id)){tasks.push(t);if(!t.done)schedule(t)}});save();$('status').textContent='Seven test responsibilities loaded.'}
$('seed').onclick=()=>seedTestData(true);seedTestData(false);
const h=new Date().getHours();$('greeting').textContent=h<12?'Good morning.':h<18?'Good afternoon.':'Good evening.';render();agenda();$('filters').children[0].classList.add('active');
</script></body></html>
