name: Build Brainy Android APK

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths: ["app/**", "*.gradle.kts", "gradle.properties", ".github/workflows/android-apk.yml"]
  push:
    branches: [main]
    paths: ["app/**", "*.gradle.kts", "gradle.properties", ".github/workflows/android-apk.yml"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Validate bundled app
        run: |
          test -f app/src/main/assets/index.html
          grep -q "Message Brainy" app/src/main/assets/index.html
          grep -q "naturalUpdate" app/src/main/assets/index.html
          grep -q "ReminderEngine.restoreAll" app/src/main/java/app/brainy/personal/MainActivity.java
          ! grep -R "chatgpt.site" app/src/main
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Build debug APK
        run: gradle --no-daemon assembleDebug
      - name: Verify APK
        run: test -s app/build/outputs/apk/debug/app-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: brainy-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
